<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reittisuunnittelu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <div id="info-bar" class="info-bar hidden"></div>

    <button id="menu-toggle" aria-label="Toggle Menu">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <nav id="sidebar" class="sidebar">
        <h2 id="sidebar-title"></h2>
        
        <div class="search-box">
            <label id="search-label" for="address-search"></label>
            <input type="text" id="address-search" autocomplete="off">
            <div id="search-results" class="search-results hidden"></div>
        </div>
        
        <div class="actions">
            <input type="file" id="btn-gpx-import" multiple accept=".gpx" class="hidden">
            <button id="btn-gpx-import-trigger" class="btn btn-primary"></button>
            <button id="btn-merge-tracks" class="btn btn-success hidden"></button>
            <button id="btn-gpx-export" class="btn btn-primary hidden"></button>
            <button id="btn-clear-all" class="btn btn-danger"></button>
        </div>
        <div class="sidebar-actions-end"></div>

        <div class="sidebar-contact-section" style="margin-top: auto; padding: 20px 0 10px 0; border-top: 1px solid #eee;">
            <h4 id="contact-title" style="margin: 0 0 8px 0; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #666;">
                Contact
            </h4>
            <a href="https://www.instagram.com/kaffe_racer" target="_blank" rel="noopener noreferrer"
               style="display: inline-flex; align-items: center; gap: 6px; color: #e1306c; font-weight: bold; text-decoration: none; font-size: 14px;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block;">
                    <defs>
                        <linearGradient id="sidebar-ig-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#fdf497" />
                            <stop offset="5%" stop-color="#fdf497" />
                            <stop offset="45%" stop-color="#fd5949" />
                            <stop offset="60%" stop-color="#d6249f" />
                            <stop offset="90%" stop-color="#285AEB" />
                        </linearGradient>
                    </defs>
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#sidebar-ig-gradient)"></rect>
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" stroke="url(#sidebar-ig-gradient)"></path>
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="url(#sidebar-ig-gradient)"></line>
                </svg>
                @kaffe_racer
            </a>
        </div>
    </nav>

    <main id="map-container">
        <div id="map"></div>
    </main>

    <section id="info-widget" class="info-widget">
        <div class="widget-handle">
            <h3 id="widget-title"></h3>
        </div>
        <div class="route-list-container">
            <div id="route-stats" class="route-stats"></div>
            <ul id="route-list" class="route-list"></ul>
        </div>
    </section>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal">
            <p id="modal-text"></p>
            <div class="modal-buttons">
                <button id="modal-btn-yes" class="btn btn-danger"></button>
                <button id="modal-btn-no" class="btn btn-secondary"></button>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
