<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reittisuunnittelu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #ecf0f1;
            --text-color: #2c3e50;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; height: 100vh; overflow: hidden;
            color: var(--text-color);
            flex-direction: row;
        }

        #sidebar {
            width: 380px; background: white;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            z-index: 1000; display: flex; flex-direction: column;
            padding: 20px; box-sizing: border-box; overflow-y: auto;
            flex-shrink: 0;
        }

        #map { flex-grow: 1; height: 100%; cursor: crosshair; }

        h2, h3 { margin-top: 0; color: var(--primary-color); border-bottom: 2px solid var(--bg-color); padding-bottom: 10px; }
        h2 { font-size: 1.5rem; }
        h3 { font-size: 1.2rem; margin-top: 20px; }

        .control-group { margin-bottom: 15px; }

        .checkbox-container {
            display: flex; align-items: center; gap: 8px;
            margin: 12px 0; font-weight: 600; font-size: 0.95rem;
            background: var(--bg-color); padding: 10px; border-radius: 4px;
        }
        .checkbox-container input { width: 18px; height: 18px; cursor: pointer; }

        .btn {
            color: white; border: none; padding: 12px 15px; border-radius: 6px;
            cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s;
            margin-bottom: 8px; display: block; text-align: center; box-sizing: border-box; font-size: 0.95rem;
            text-decoration: none; -webkit-tap-highlight-color: transparent;
        }
        .btn-success { background: var(--success-color); }
        .btn-success:hover { background: #27ae60; }
        .btn-accent { background: var(--accent-color); }
        .btn-accent:hover { background: #2980b9; }
        .btn-secondary { background: #7f8c8d; }
        .btn-secondary:hover { background: #6c7a7d; }
        .btn-danger { background: var(--danger-color); }
        .btn-danger:hover { background: #c0392b; }

        .file-upload { position: relative; display: inline-block; width: 100%; margin-bottom: 8px; }
        .file-upload input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        .instruction { font-size: 0.85rem; color: #7f8c8d; font-style: italic; margin-bottom: 15px; line-height: 1.4; }

        #api-status { font-size: 0.8rem; margin-bottom: 15px; padding: 8px 12px; border-radius: 4px; font-weight: bold; line-height: 1.4; }
        .status-ok { background: #badc58; color: #27ae60; }

        .route-list { list-style: none; padding: 0; margin: 0; border: 1px solid var(--bg-color); border-radius: 4px; max-height: 200px; overflow-y: auto; }
        .route-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--bg-color); font-size: 1.05rem; background: #fff; }
        .route-item:last-child { border-bottom: none; }
        
        .route-meta { display: flex; align-items: center; gap: 12px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .color-indicator { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
        .route-distance { font-size: 1.15rem; color: var(--primary-color); margin-left: 4px; }
        
        .delete-btn { background: none; border: none; color: var(--danger-color); cursor: pointer; font-weight: bold; font-size: 1.4rem; padding: 0 5px; }

        /* Lipun kuvakeasetukset */
        .flag-icon-container { position: relative; width: 24px; height: 30px; cursor: grab; }
        .flag-icon-container:active { cursor: grabbing; }
        .flag-pole { position: absolute; bottom: 0; left: 0; width: 2.5px; height: 30px; background-color: #333; box-shadow: 1px 1px 1px rgba(0,0,0,0.3); }
        .flag-cloth { position: absolute; top: 0; left: 2.5px; width: 18px; height: 13px; border-radius: 1px 3px 3px 1px; box-shadow: 1px 1px 2px rgba(0,0,0,0.4); }

        .leaflet-div-icon { background: transparent !important; border: none !important; }

        /* Ponnahdusikkunan (Modal) tyylit */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5); z-index: 2000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: white; padding: 20px; border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); width: 280px; text-align: center;
            transform: scale(0.9); transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        .modal-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--primary-color); }
        .modal-buttons { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.95rem; min-width: 90px; }
        .modal-btn-confirm { background: var(--danger-color); color: white; }
        .modal-btn-confirm:hover { background: #c0392b; }
        .modal-btn-cancel { background: #bdc3c7; color: var(--primary-color); }
        .modal-btn-cancel:hover { background: #95a5a6; }

        /* Mobiilimukautukset */
        @media (max-width: 768px) {
            body { flex-direction: column-reverse; }
            #sidebar {
                width: 100%; max-height: 42vh; height: auto;
                padding: 15px; box-shadow: 0 -2px 15px rgba(0,0,0,0.15);
                border-top: 1px solid var(--bg-color);
            }
            #map { flex-grow: 1; height: 58vh; }
            h2 { font-size: 1.3rem; padding-bottom: 5px; }
            h3 { margin-top: 10px; font-size: 1.1rem; }
            .btn { padding: 12px; margin-bottom: 6px; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <h2>Reittisuunnittelu</h2>
        
        <div id="api-status" class="status-ok">Yhteys suojattu Cloudflare Workerilla</div>

        <label class="checkbox-container">
            <input type="checkbox" id="avoid-highways-checkbox">
            Vältä moottoriteitä
        </label>

        <p class="instruction">Klikkaa karttaa lisätäksesi pisteitä. Siirrä vetämällä ja poista napauttamalla lippua.</p>

        <div class="control-group">
            <div class="file-upload">
                <span class="btn btn-secondary">Tuo GPX-tiedostoja (.gpx)</span>
                <input type="file" id="gpx-file-input" accept=".gpx" multiple>
            </div>
            <button id="merge-routes-btn" class="btn btn-success" style="display: none;">Yhdistä urat yhdeksi reitiksi</button>
            <button id="export-gpx-btn" class="btn btn-accent" style="display: none;">Lataa valmis GPX (.gpx)</button>
            <button id="clear-btn" class="btn btn-danger">Tyhjennä kaikki</button>
        </div>

        <h3>Aktiiviset reitit ja pituudet</h3>
        <ul id="gpx-route-list" class="route-list">
            <li class="route-item" style="color: #7f8c8d; font-style: italic; font-size: 0.95rem;">Ei aktiivisia reittejä</li>
        </ul>
    </div>

    <div id="map"></div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-text">Poistetaanko piste?</div>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Peruuta</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Poista</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script>
        // Määritetään suojatun Cloudflare Workerin päätepiste globaalisti
        const WORKER_URL = 'https://route-planner.mika-kahola.workers.dev/';

        const state = {
            routes: [],     
            clickMarkers: [], 
            colorPalette: ['#3498db', '#9b59b6', '#2ecc71', '#e67e22', '#e74c3c', '#1abc9c'],
            colorIndex: 0,
            pendingDeletion: null
        };

        const map = L.map('map', { tap: false }).setView([60.1699, 24.9384], 11);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Rekisteröidään tapahtumat dynaamiselle harvennukselle ja zoomaustoiminnoille
        map.on('moveend', renderDynamicWaypoints);
        map.on('zoomend', renderDynamicWaypoints);
        map.on('click', async (e) => { await handleMapClick(e.latlng); });

        document.getElementById('clear-btn').addEventListener('click', clearAllRoutes);
        document.getElementById('gpx-file-input').addEventListener('change', handleMultiGPXUpload);
        document.getElementById('merge-routes-btn').addEventListener('click', mergeAllActiveRoutes);
        document.getElementById('export-gpx-btn').addEventListener('click', exportRoutesToGpxFile);

        document.getElementById('modal-cancel-btn').addEventListener('click', closeConfirmationModal);
        document.getElementById('modal-confirm-btn').addEventListener('click', executeWaypointDeletion);

        function simplifyCoordinates(points, tolerance) {
            if (points.length <= 2) return points;
            let maxSqDist = 0; let index = 0; const end = points.length - 1;
            for (let i = 1; i < end; i++) {
                const sqDist = getSquareSegmentDistance(points[i], points[0], points[end]);
                if (sqDist > maxSqDist) { index = i; maxSqDist = sqDist; }
            }
            if (maxSqDist > tolerance * tolerance) {
                const results1 = simplifyCoordinates(points.slice(0, index + 1), tolerance);
                const results2 = simplifyCoordinates(points.slice(index), tolerance);
                return results1.slice(0, results1.length - 1).concat(results2);
            }
            return [points[0], points[end]];
        }

        function getSquareSegmentDistance(p, p1, p2) {
            let x = p1[1], y = p1[0], dx = p2[1] - x, dy = p2[0] - y;
            if (dx !== 0 || dy !== 0) {
                let t = ((p[1] - x) * dx + (p[0] - y) * dy) / (dx * dx + dy * dy);
                if (t > 1) { x = p2[1]; y = p2[0]; } else if (t > 0) { x += dx * t; y += dy * t; }
            }
            dx = p[1] - x; dy = p[0] - y; return dx * dx + dy * dy;
        }

        async function fetchRouteSegment(start, end) {
            const avoidHighways = document.getElementById('avoid-highways-checkbox').checked;
            
            const body = {
                coordinates: [[start[1], start[0]], [end[1], end[0]]],
                ...(avoidHighways && { options: { avoid_features: ["highway"] } })
            };

            try {
                // Tehdään POST-pyyntö suoraan Cloudflare Workerille, joka hoitaa API-avaimen liittämisen pilvessä
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json; charset=utf-8' },
                    body: JSON.stringify(body)
                });
                
                if (response.ok) {
                    const data = await response.json();
                    if (data.features && data.features.length > 0) {
                        let segment = data.features[0].geometry.coordinates.map(c => [c[1], c[0]]);
                        return simplifyCoordinates(segment, 0.0001);
                    }
                }
            } catch (err) { 
                console.error("Reititysvirhe Cloudflare Workerin kautta, piirretään suorana linjana:", err); 
            }
            return [start, end];
        }

        async function recalculateWholeRouteGeometry(route, deletedIndex = null, wasEdge = false) {
            if (wasEdge && deletedIndex !== null && route.coords.length > 0) {
                if (deletedIndex === 0) {
                    const nextWp = route.waypoints[0];
                    let closestIdx = findClosestCoordinateIndex(route.coords, nextWp);
                    route.coords = route.coords.slice(closestIdx);
                } else {
                    const prevWp = route.waypoints[route.waypoints.length - 1];
                    let closestIdx = findClosestCoordinateIndex(route.coords, prevWp);
                    route.coords = route.coords.slice(0, closestIdx + 1);
                }
            } else {
                let newCoords = [];
                if (route.waypoints.length === 1) {
                    newCoords = [route.waypoints[0]];
                } else {
                    for (let i = 0; i < route.waypoints.length - 1; i++) {
                        const segment = await fetchRouteSegment(route.waypoints[i], route.waypoints[i+1]);
                        if (i === 0) {
                            newCoords.push(...segment);
                        } else {
                            newCoords.push(...segment.slice(1));
                        }
                    }
                }
                route.coords = newCoords;
            }
            route.layer.setLatLngs(route.coords);
            updateSidebarRouteList();
        }

        function findClosestCoordinateIndex(coords, target) {
            let minTargetDist = Infinity;
            let targetIndex = 0;
            for(let i=0; i<coords.length; i++) {
                let d = Math.pow(coords[i][0] - target[0], 2) + Math.pow(coords[i][1] - target[1], 2);
                if(d < minTargetDist) {
                    minTargetDist = d;
                    targetIndex = i;
                }
            }
            return targetIndex;
        }

        function renderDynamicWaypoints() {
            state.clickMarkers.forEach(m => map.removeLayer(m));
            state.clickMarkers = [];

            if (state.routes.length === 0) return;
            const bounds = map.getBounds();

            state.routes.forEach(route => {
                if (!route.waypoints || route.waypoints.length === 0) return;

                let insideIndices = [];
                for (let i = 0; i < route.waypoints.length; i++) {
                    if (bounds.contains(L.latLng(route.waypoints[i][0], route.waypoints[i][1]))) {
                        insideIndices.push(i);
                    }
                }

                let targetIndices = new Set();

                if (insideIndices.length > 0) {
                    const maxInsidePoints = 20; 
                    const step = Math.max(1, Math.floor(insideIndices.length / maxInsidePoints));
                    
                    for (let i = 0; i < insideIndices.length; i += step) {
                        targetIndices.add(insideIndices[i]);
                    }
                    targetIndices.add(insideIndices[insideIndices.length - 1]);

                    const firstInsideIndex = insideIndices[0];
                    if (firstInsideIndex > 0) {
                        targetIndices.add(firstInsideIndex - 1);
                    }

                    const lastInsideIndex = insideIndices[insideIndices.length - 1];
                    if (lastInsideIndex < route.waypoints.length - 1) {
                        targetIndices.add(lastInsideIndex + 1);
                    }
                } else {
                    targetIndices.add(0);
                    targetIndices.add(route.waypoints.length - 1);
                }

                targetIndices.forEach(idx => {
                    const coord = route.waypoints[idx];
                    if (!coord) return;

                    const flagIcon = L.divIcon({
                        className: 'custom-flag-icon',
                        html: `
                            <div class="flag-icon-container" title="Raahaa siirtääksesi, napauta poistaaksesi">
                                <div class="flag-pole"></div>
                                <div class="flag-cloth" style="background-color: ${route.color};"></div>
                            </div>
                        `,
                        iconSize: [24, 30],
                        iconAnchor: [1, 30]
                    });

                    const flagMarker = L.marker([coord[0], coord[1]], { 
                        icon: flagIcon,
                        draggable: true 
                    }).addTo(map);
                    
                    flagMarker.on('click', (evt) => {
                        L.DomEvent.stopPropagation(evt);
                        openConfirmationModal(route.id, idx);
                    });

                    flagMarker.on('dragend', async (evt) => {
                        const newLatLng = evt.target.getLatLng();
                        route.waypoints[idx] = [newLatLng.lat, newLatLng.lng];
                        
                        await recalculateWholeRouteGeometry(route);
                        renderDynamicWaypoints();
                    });

                    state.clickMarkers.push(flagMarker);
                });
            });
        }

        function openConfirmationModal(routeId, waypointIndex) {
            state.pendingDeletion = { routeId, waypointIndex };
            document.getElementById('confirm-modal').classList.add('active');
        }

        function closeConfirmationModal() {
            state.pendingDeletion = null;
            document.getElementById('confirm-modal').classList.remove('active');
        }

        async function executeWaypointDeletion() {
            if (!state.pendingDeletion) return;
            
            const { routeId, waypointIndex } = state.pendingDeletion;
            closeConfirmationModal();

            const route = state.routes.find(r => r.id === routeId);
            if (!route) return;

            const isEdgePoint = (waypointIndex === 0 || waypointIndex === route.waypoints.length - 1);
            route.waypoints.splice(waypointIndex, 1);

            if (route.waypoints.length === 0) {
                removeWholeRoute(routeId);
                return;
            }

            await recalculateWholeRouteGeometry(route, waypointIndex, isEdgePoint);
            renderDynamicWaypoints();
        }

        async function handleMapClick(latlng) {
            const newPoint = [latlng.lat, latlng.lng];
            let activeRoute = state.routes[state.routes.length - 1];

            if (!activeRoute) {
                const color = state.colorPalette[state.colorIndex % state.colorPalette.length];
                state.colorIndex++;
                const routeId = 'custom_' + Date.now();
                const layer = L.polyline([], { color: color, weight: 6, opacity: 0.85 }).addTo(map);

                activeRoute = {
                    id: routeId,
                    name: 'Oma reitti',
                    waypoints: [], 
                    coords: [],    
                    color: color,
                    layer: layer
                };
                state.routes.push(activeRoute);
            }

            activeRoute.waypoints.push(newPoint);

            if (activeRoute.coords.length === 0) {
                activeRoute.coords.push(newPoint);
            } else {
                const lastWp = activeRoute.waypoints[activeRoute.waypoints.length - 2];
                const segment = await fetchRouteSegment(lastWp, newPoint);
                activeRoute.coords.push(...segment.slice(1));
            }

            activeRoute.layer.setLatLngs(activeRoute.coords);
            updateSidebarRouteList();
            renderDynamicWaypoints();
        }

        function handleMultiGPXUpload(e) {
            const files = e.target.files;
            if (!files || files.length === 0) return;

            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(evt) {
                    try {
                        const parser = new DOMParser();
                        const xmlDoc = parser.parseFromString(evt.target.result, "text/xml");
                        const rawCoords = [];

                        const trkpts = xmlDoc.getElementsByTagName('trkpt');
                        const wpts = xmlDoc.getElementsByTagName('wpt');
                        const sourcePoints = trkpts.length > 0 ? trkpts : wpts;

                        if (sourcePoints.length === 0) return;

                        for (let i = 0; i < sourcePoints.length; i++) {
                            let lat = parseFloat(sourcePoints[i].getAttribute('lat'));
                            let lon = parseFloat(sourcePoints[i].getAttribute('lon'));
                            if (!isNaN(lat) && !isNaN(lon)) {
                                rawCoords.push([lat, lon]);
                            }
                        }

                        const color = state.colorPalette[state.colorIndex % state.colorPalette.length];
                        state.colorIndex++;
                        const routeId = 'route_' + Date.now() + Math.random().toString(36).substr(2, 5);

                        const layer = L.polyline(rawCoords, { color: color, weight: 6, opacity: 0.85 }).addTo(map);

                        const step = Math.max(1, Math.floor(rawCoords.length / 50));
                        const calculatedWaypoints = [];
                        for(let i=0; i<rawCoords.length; i+=step) {
                            calculatedWaypoints.push(rawCoords[i]);
                        }
                        if(calculatedWaypoints[calculatedWaypoints.length-1] !== rawCoords[rawCoords.length-1]) {
                            calculatedWaypoints.push(rawCoords[rawCoords.length-1]);
                        }

                        state.routes.push({
                            id: routeId,
                            name: file.name.replace('.gpx', ''),
                            waypoints: calculatedWaypoints,
                            coords: rawCoords,
                            color: color,
                            layer: layer
                        });

                        updateSidebarRouteList();
                        zoomToFitAllRoutes();
                        renderDynamicWaypoints();

                    } catch (err) { console.error("Virhe GPX-tiedoston lukemisessa: ", err); }
                };
                reader.readAsText(file);
            });
            e.target.value = '';
        }

        async function mergeAllActiveRoutes() {
            if (state.routes.length < 2) return;

            const finalMergedCoords = [];
            const finalWaypoints = [];
            
            for (let i = 0; i < state.routes.length; i++) {
                const currentRoute = state.routes[i];
                finalWaypoints.push(...currentRoute.waypoints);

                if (finalMergedCoords.length === 0) {
                    finalMergedCoords.push(...currentRoute.coords);
                } else {
                    const lastPointOfProgress = finalMergedCoords[finalMergedCoords.length - 1];
                    const firstPointOfNextRoute = currentRoute.coords[0];

                    const bridge = await fetchRouteSegment(lastPointOfProgress, firstPointOfNextRoute);
                    finalMergedCoords.push(...bridge.slice(1));
                    finalMergedCoords.push(...currentRoute.coords.slice(1));
                }
            }

            state.routes.forEach(r => map.removeLayer(r.layer));
            
            const newColor = state.colorPalette[state.colorIndex % state.colorPalette.length];
            state.colorIndex++;
            const newRouteId = 'merged_' + Date.now();
            
            const newLayer = L.polyline(finalMergedCoords, { color: newColor, weight: 6, opacity: 0.9 }).addTo(map);

            state.routes = [{
                id: newRouteId,
                name: 'Yhdistetty reitti',
                waypoints: finalWaypoints,
                coords: finalMergedCoords,
                color: newColor,
                layer: newLayer
            }];

            updateSidebarRouteList();
            zoomToFitAllRoutes();
            renderDynamicWaypoints();
        }

        function exportRoutesToGpxFile() {
            if (state.routes.length === 0) return;

            let gpxText = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            gpxText += `<gpx version="1.1" creator="SimpleRoutePlanner" xmlns="http://www.topografix.com/GPX/1/1" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.topografix.com/GPX/1/1 http://www.topografix.com/GPX/1/1/gpx.xsd">\n`;
            gpxText += `  <metadata>\n    <name>Reittisuunnittelu Export</name>\n    <time>${new Date().toISOString()}</time>\n  </metadata>\n`;

            state.routes.forEach(route => {
                if (route.coords.length === 0) return;
                gpxText += `  <trk>\n    <name>${route.name}</name>\n    <trkseg>\n`;
                route.coords.forEach(coord => {
                    gpxText += `      <trkpt lat="${coord[0].toFixed(6)}" lon="${coord[1].toFixed(6)}"></trkpt>\n`;
                });
                gpxText += `    </trkseg>\n  </trk>\n`;
            });

            gpxText += `</gpx>`;

            const blob = new Blob([gpxText], { type: 'application/gpx+xml;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            
            const downloadLink = document.createElement('a');
            downloadLink.href = url;
            
            const timestamp = new Date().toISOString().slice(0,10);
            downloadLink.download = `reitti_${timestamp}.gpx`;
            
            document.body.appendChild(downloadLink);
            downloadLink.click();
            
            document.body.removeChild(downloadLink);
            URL.revokeObjectURL(url);
        }

        function calculateGpxGeometricDistance(coords) {
            let totalDist = 0;
            for (let i = 0; i < coords.length - 1; i++) {
                totalDist += L.latLng(coords[i][0], coords[i][1]).distanceTo(L.latLng(coords[i+1][0], coords[i+1][1]));
            }
            return totalDist / 1000;
        }

        function zoomToFitAllRoutes() {
            if (state.routes.length === 0) return;
            const group = new L.featureGroup(state.routes.map(r => r.layer));
            map.fitBounds(group.getBounds().pad(0.05));
        }

        function updateSidebarRouteList() {
            const listEl = document.getElementById('gpx-route-list');
            listEl.innerHTML = '';

            const mergeBtn = document.getElementById('merge-routes-btn');
            const exportBtn = document.getElementById('export-gpx-btn');
            
            if (state.routes.length >= 2) {
                mergeBtn.style.display = 'block';
                mergeBtn.innerText = `Yhdistä urat (${state.routes.length} kpl) yhdeksi`;
            } else {
                mergeBtn.style.display = 'none';
            }

            if (state.routes.length >= 1) {
                exportBtn.style.display = 'block';
            } else {
                exportBtn.style.display = 'none';
            }

            if (state.routes.length === 0) {
                listEl.innerHTML = '<li class="route-item" style="color: #7f8c8d; font-style: italic; font-size: 0.95rem;">Ei aktiivisia reittejä</li>';
                return;
            }

            state.routes.forEach(route => {
                const currentDistance = calculateGpxGeometricDistance(route.coords);
                const li = document.createElement('li');
                li.className = 'route-item';

                li.innerHTML = `
                    <div class="route-meta">
                        <span class="color-indicator" style="background-color: ${route.color}"></span>
                        <span title="${route.name}">${route.name.substring(0, 14)}${route.name.length > 14 ? '...' : ''}</span>
                        <span class="route-distance"><b>${currentDistance.toFixed(1)} km</b></span>
                    </div>
                `;

                const delBtn = document.createElement('button');
                delBtn.className = 'delete-btn';
                delBtn.innerHTML = '&times;';
                delBtn.onclick = (evt) => {
                    evt.stopPropagation(); 
                    removeWholeRoute(route.id);
                };

                li.appendChild(delBtn);
                listEl.appendChild(li);
            });
        }

        function removeWholeRoute(id) {
            const routeToRemove = state.routes.find(r => r.id === id);
            if (routeToRemove) {
                map.removeLayer(routeToRemove.layer);
                state.routes = state.routes.filter(r => r.id !== id);
                
                updateSidebarRouteList();
                renderDynamicWaypoints();
                if (state.routes.length > 0) zoomToFitAllRoutes();
            }
        }

        function clearAllRoutes() {
            state.routes.forEach(r => map.removeLayer(r.layer));
            state.clickMarkers.forEach(m => map.removeLayer(m)); 
            
            state.routes = [];
            state.clickMarkers = [];
            state.colorIndex = 0;
            updateSidebarRouteList();
        }
    </script>
</body>
</html>
