<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div id="info-bar" class="info-bar hidden"></div>

    <main id="map-container">
        <button id="menu-toggle" aria-label="Toggle Menu">
            <span></span><span></span><span></span>
        </button>
        <div id="map"></div>
    </main>

    <aside id="sidebar" class="sidebar">
        <h2 id="sidebar-title"></h2>
        
        <div class="search-box">
            <label id="search-label" for="address-search"></label>
            <input type="text" id="address-search" autocomplete="off">
            <div id="search-results" class="search-results hidden"></div>
        </div>

        <div class="actions">
            <button id="btn-gpx-import-trigger" class="btn btn-primary"></button>
            <input type="file" id="btn-gpx-import" multiple accept=".gpx" style="display: none;">
            <button id="btn-merge-tracks" class="btn btn-secondary hidden"></button>
            <button id="btn-gpx-export" class="btn btn-success hidden"></button>
            <button id="btn-clear-all" class="btn btn-danger"></button>
        </div>
    </aside>
    
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <section id="info-widget" class="info-widget">
        <h3 id="widget-title" class="widget-handle"></h3>
        <div id="route-list-container" class="route-list-container">
            <div id="route-stats" class="route-stats"></div>
            <ul id="route-list" class="route-list"></ul>
        </div>
    </section>

    <div id="confirm-modal" class="modal-overlay hidden">
        <div class="modal">
            <p id="modal-text"></p>
            <div class="modal-buttons">
                <button id="modal-btn-yes" class="btn btn-danger"></button>
                <button id="modal-btn-no" class="btn btn-secondary"></button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
