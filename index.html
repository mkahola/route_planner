<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reittisuunnittelu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
    
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <button id="menu-toggle" aria-label="Avaa valikko">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="sidebar">
        <h2>Reittisuunnittelu</h2>
        <div id="api-status">Vain katselutila käytössä</div>

        <label class="checkbox-container">
            <input type="checkbox" id="avoid-highways-checkbox">
            Vältä moottoriteitä
        </label>

        <p class="instruction">Klikkaa karttapohjaa asettaaksesi reittipisteitä. Voit siirtää pisteitä raahaamalla niitä lipuista.</p>

        <div style="display: flex; flex-direction: column; gap: 5px;">
            <div class="file-upload">
                <span class="btn btn-secondary">Tuo GPX-tiedostoja</span>
                <input type="file" id="gpx-file-input" accept=".gpx" multiple>
            </div>
            <button id="merge-routes-btn" class="btn btn-success" style="display: none;">Yhdistä urat yhdeksi</button>
            <button id="export-gpx-btn" class="btn btn-accent" style="display: none;">Lataa valmis GPX</button>
            <button id="clear-btn" class="btn btn-danger">Tyhjennä kaikki</button>
        </div>
    </div>

    <div id="info-widget">
        <h3>Reittisuunnittelu</h3>
        <div class="route-list-container">
            <ul id="gpx-route-list" class="route-list">
                <li class="route-item" style="color: #64748b; font-style: italic; border: none;">Ei aktiivisia reittejä</li>
            </ul>
        </div>
    </div>

    <div id="map"></div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-text">Poistetaanko piste?</div>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel">Peruuta</button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm">Poista</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
