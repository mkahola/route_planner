<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reittisuunnittelu</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="anonymous" />
    
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>

    <button id="menu-toggle">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <div id="sidebar">
        <h2 id="sidebar-title"></h2>
        <div id="api-status"></div>

        <label class="checkbox-container">
            <input type="checkbox" id="avoid-highways-checkbox">
            <span id="label-avoid-highways"></span>
        </label>

        <p id="sidebar-instruction" class="instruction"></p>

        <div class="sidebar-actions">
            <div class="file-upload">
                <span id="btn-import-label" class="btn btn-secondary"></span>
                <input type="file" id="gpx-file-input" accept=".gpx" multiple>
            </div>
            <button id="merge-routes-btn" class="btn btn-success" style="display: none;"></button>
            <button id="export-gpx-btn" class="btn btn-accent" style="display: none;"></button>
            <button id="clear-btn" class="btn btn-danger"></button>
        </div>
    </div>

    <div id="info-widget">
        <h3 id="widget-title"></h3>
        <div class="route-list-container">
            <ul id="gpx-route-list" class="route-list"></ul>
        </div>
    </div>

    <div id="map"></div>

    <div id="confirm-modal" class="modal-overlay">
        <div class="modal-content">
            <div id="modal-text" class="modal-text"></div>
            <div class="modal-buttons">
                <button id="modal-cancel-btn" class="modal-btn modal-btn-cancel"></button>
                <button id="modal-confirm-btn" class="modal-btn modal-btn-confirm"></button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin="anonymous"></script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
