<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Reittisuunnittelija - @kaffe_racer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="readonly-bar" class="readonly-bar hidden">
        <span id="readonly-text">Vain katselutila käytössä</span>
    </div>

    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="Toggle Navigation">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2 id="sidebar-title">Reitin suunnittelu</h2>
            <button id="sidebar-close" class="close-btn">&times;</button>
        </div>

        <div class="sidebar-content">
            <div class="search-box">
                <label id="search-label" for="address-search">Hae osoitetta tai paikkaa:</label>
                <input type="text" id="address-search" autocomplete="off" placeholder="Kirjoita osoite...">
                <ul id="search-results" class="search-results hidden"></ul>
            </div>

            <div class="actions-group">
                <input type="file" id="gpx-file-input" accept=".gpx" multiple style="display: none;">
                <button id="btn-gpx-import-trigger" class="btn btn-secondary">Tuo GPX-tiedostoja</button>
                <button id="btn-merge-tracks" class="btn btn-primary hidden">Yhdistä urat yhtenäiseksi reitiksi</button>
                <button id="btn-gpx-export" class="btn btn-success hidden">Vie reitti GPX-tiedostona</button>
                <button id="btn-clear-all" class="btn btn-danger">Tyhjennä kaikki</button>
            </div>

            <div class="sidebar-actions-end"></div> 

            <div class="sidebar-contact-section">
                <h4 id="contact-title">Contact</h4>
                <a href="https://www.instagram.com/kaffe_racer" target="_blank" rel="noopener noreferrer" class="instagram-brand-link">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <defs>
                            <linearGradient id="sidebar-ig-gradient" x1="0%" y1="100%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#fdf497" />
                                <stop offset="5%" stop-color="#fdf497" />
                                <stop offset="45%" stop-color="#fd5949" />
                                <stop offset="60%" stop-color="#d6249f" />
                                <stop offset="90%" stop-color="#285AEB" />
                            </linearGradient>
                        </defs>
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#sidebar-ig-gradient)"></rect>
                        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" stroke="url(#sidebar-ig-gradient)"></path>
                        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" stroke="url(#sidebar-ig-gradient)"></line>
                    </svg>
                    @kaffe_racer
                </a>
            </div>
        </div>
    </aside>

    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <main id="map"></main>

    <section id="info-widget" class="info-widget">
        <div id="info-widget-header" class="info-widget-header">
            <h3 id="widget-title">Reitin tiedot</h3>
        </div>
        <div id="route-list-container" class="route-list-container">
            <p id="widget-no-routes" class="no-routes-text">Ei aktiivisia reittejä. Klikkaa karttaa luodaksesi pisteitä.</p>
            <div id="widget-stats" class="widget-stats"></div>
            <ul id="route-tracks-list" class="route-tracks-list"></ul>
        </div>
    </section>

    <div id="delete-modal" class="modal-backdrop hidden">
        <div class="modal-box">
            <p id="modal-delete-text">Poistetaanko piste?</p>
            <div class="modal-actions">
                <button id="modal-btn-confirm" class="btn btn-danger">Kyllä</button>
                <button id="modal-btn-cancel" class="btn btn-secondary">Ei</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
